<!DOCTYPE html>
<html lang="en.US">
<head>
    <meta charset="UTF-8">
    <span lang="en">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Multi-Server Timer Manager</title>
    </span>
    <link rel="stylesheet" href="style.css">
</style>
</head>
<body>
    <header>
        <h1>⏱️ Timer Manager Pro</h1>
        <div class="user-controls">
            <button id="server-switcher">Server: None</button>
            <button id="new-server-btn">New Server</button>
            <button id="config-manager-btn">Config Manager</button>
        </div>
    </header>

    <main>
        <!-- Server Selector & Dashboard -->
        <section id="server-dashboard">
            <h2>Active Server: <span id="current-server-name">None</span></h2>
            <div class="server-tabs">
                <!-- Tabs for different servers -->
            </div>
            
            <!-- Timer List Area -->
            <div id="timer-list-container">
                <h3>Timers</h3>
                <div id="timers-view">
                    <!-- Timers will be rendered here -->
                    <p class="placeholder">Select a server to view timers.</p>
                </div>
            </div>
        </section>

        <!-- Modals -->
        
        <!-- Modal 1: Add/Edit Timer -->
        <div id="timer-modal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2>Add/Edit Timer</h2>
                <form id="timer-form">
                    <label for="timer-name">Name:</label><br>
                    <input type="text" id="timer-name" required><br><br>
                    
                    <label for="timer-type">Type:</label>
                    <select id="timer-type">
                        <option value="countdown">Countdown</option>
                        <option value="schedule">Scheduled</option>
                        <option value="repeat">Repeat</option>
                    </select><br><br>

                    <label for="timer-duration">Duration (s) or Schedule Time:</label>
                    <input type="number" id="timer-duration" required><br><br>

                    <label for="timer-group">Group:</label>
                    <input type="text" id="timer-group"><br><br>

                    <label for="timer-server-id">Server ID:</label>
                    <input type="text" id="timer-server-id" required><br><br>

                    <label for="timer-status">Status:</label>
                    <select id="timer-status">
                        <option value="running">Running</option>
                        <option value="paused">Paused</option>
                        <option value="finished">Finished</option>
                    </select><br><br>

                    <button type="submit">Save Timer</button>
                </form>
            </div>
        </div>

        <!-- Modal 2: Server Settings (Storage/Firebase) -->
        <div id="server-config-modal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2>Server Settings</h2>
                <form id="server-config-form">
                    <label for="server-storageType">Storage Mode:</label>
                    <select id="server-storageType">
                        <option value="local">Local Storage Mode</option>
                        <option value="firebase">Firebase Mode</option>
                    </select><br><br>

                    <div id="local-storage-options" class="config-options">
                        <!-- Local options -->
                        <label for="local-firebase-config-id">Firebase Config ID (Optional):</label>
                        <input type="text" id="local-firebase-config-id"><br><br>
                    </div>

                    <div id="firebase-storage-options" class="config-options" style="display: none;">
                        <h3>Firebase Configuration</h3>
                        <label for="firebase-config-name">Config Name:</label><br>
                        <input type="text" id="firebase-config-name"><br><br>
                        <!-- Add fields for API Key, Project ID, etc. -->
                        <label for="firebase-config-api_key">API Key:</label><br>
                        <label for="firebase-firebase_project_id">Project ID:</label><br>
                        <button type="submit">Save Firebase Config</button>
                    </div>

                    
                    <button type="submit">Save Server Settings</button>
                </form>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
